# debate prompt-modules manifest — single source of truth for SKILL.md splits.
#
# Every entry declares:
#   id          — handle used in references and tests
#   path        — file location relative to skills/debate/
#   loaded_by   — when/where this module enters the system
#                   role-session       : included in role's first-turn prompt at spawn
#                   role-system-prompt : included in role's system prompt at spawn (every turn)
#                   moderator-optional : moderator may read it under specific conditions; not auto-loaded
#   purpose     — one-line human description for onboarding / review
#   invariants  — machine-checkable assertions enforced by tests/manifest-invariants.sh
#                   kind: contains      → value MUST appear as a substring
#                   kind: forbidden     → value MUST NOT appear as a substring
#                   kind: contains_any  → at least one of values MUST appear
#                   kind: contains_all  → every one of values MUST appear

version: 1
modules:
  - id: role-defender
    path: references/roles/defender.md
    loaded_by: role-session
    purpose: "Defender role identity and per-round instruction template"
    invariants:
      - { kind: contains,  value: "defend the original proposal" }
      - { kind: forbidden, value: "## Your examination angle" }

  - id: role-role-a
    path: references/roles/role-a.md
    loaded_by: role-session
    purpose: "Role A - first focused critic, scoped to a specific examination angle"
    invariants:
      - { kind: contains, value: "## Your examination angle" }

  - id: role-role-b
    path: references/roles/role-b.md
    loaded_by: role-session
    purpose: "Role B (topic-conditional) - distinct second examination angle"
    invariants:
      - { kind: contains, value: "## Your examination angle" }

  - id: role-wildcard
    path: references/roles/wildcard.md
    loaded_by: role-session
    purpose: "Wildcard - divergent thinker, NOT scoped to a specific angle"
    invariants:
      - { kind: contains,  value: "NOT scoped" }
      - { kind: forbidden, value: "## Your examination angle" }

  - id: parallel-tmux
    path: references/parallel-tmux.md
    loaded_by: moderator-optional
    purpose: "tmux split-pane visualization (NOT a parallelism mechanism for agent-session itself)"
    invariants:
      - { kind: contains, value: "Visualization, not parallelism" }
      - { kind: contains, value: "tmux" }

  # Deliberation-preset modules
  - id: role-stakeholder
    path: references/roles/stakeholder.md
    loaded_by: role-session
    preset: deliberation
    purpose: "Stakeholder role template — advocates from a specific lens, identity dynamically filled at spawn"
    invariants:
      - { kind: contains, value: "speak for a specific stakeholder" }
      - { kind: contains, value: "win-condition" }
      - { kind: contains, value: "red-line" }
      - { kind: forbidden, value: "examination angle" }  # NOT a critic

  - id: role-synthesizer
    path: references/roles/synthesizer.md
    loaded_by: role-session
    preset: deliberation
    purpose: "Synthesizer role — cross-perspective integrator, maintains trade-off matrix"
    invariants:
      - { kind: contains, value: "cross-perspective integrator" }
      - { kind: contains, value: "trade-off matrix" }
      - { kind: contains,  value: "do NOT represent" }              # positively enforce non-advocacy phrasing
      - { kind: forbidden, value: "I recommend we choose" }         # would appear in drifted advocacy
      - { kind: forbidden, value: "my preferred option" }           # would appear in drifted advocacy

  - id: output-format-persuasion
    path: references/output-format-persuasion.md
    loaded_by: role-system-prompt
    preset: persuasion
    purpose: "Output format spec, Persuasion preset (hold/concede/add stance)"
    invariants:
      - { kind: contains,     value: "## TL;DR" }
      - { kind: contains,     value: "[stance:" }
      - { kind: contains_all, values: ["hold", "concede", "add"] }
      - { kind: contains,     value: "## Argument" }

  - id: output-format-deliberation
    path: references/output-format-deliberation.md
    loaded_by: role-system-prompt
    preset: deliberation
    purpose: "Output format spec, Deliberation preset (prefer/accept/oppose/abstain stance)"
    invariants:
      - { kind: contains,     value: "## TL;DR" }
      - { kind: contains,     value: "[stance:" }
      - { kind: contains_all, values: ["prefer", "accept", "oppose", "abstain"] }
      - { kind: contains,     value: "## Argument" }
      - { kind: forbidden,    value: "hold/concede/add" }  # cross-vocab leakage guard

  - id: stance-tags-persuasion
    path: references/stance-tags-persuasion.md
    loaded_by: role-system-prompt
    preset: persuasion
    purpose: "Stance tag semantics (Persuasion): hold/concede/add"
    invariants:
      - { kind: contains_all, values: ["hold", "concede", "add"] }

  - id: stance-tags-deliberation
    path: references/stance-tags-deliberation.md
    loaded_by: role-system-prompt
    preset: deliberation
    purpose: "Stance tag semantics (Deliberation): prefer/accept/oppose/abstain"
    invariants:
      - { kind: contains_all, values: ["prefer", "accept", "oppose", "abstain"] }

  # Preset modules
  - id: preset-persuasion
    path: references/modes/persuasion.md
    loaded_by: preset-spec
    preset: persuasion
    purpose: "Persuasion preset spec: 4 primitives as frontmatter + descriptive prose"
    invariants:
      - { kind: contains_all, values: ["preset: persuasion", "role-topology:", "stance-contract:", "checkpoint-policy:", "output-format:"] }
      - { kind: contains,     value: "Walton" }  # academic provenance check

  - id: preset-deliberation
    path: references/modes/deliberation.md
    loaded_by: preset-spec
    preset: deliberation
    purpose: "Deliberation preset spec: 4 primitives as frontmatter + descriptive prose"
    invariants:
      - { kind: contains_all, values: ["preset: deliberation", "role-topology:", "stance-contract:", "checkpoint-policy:", "output-format:"] }
      - { kind: contains,     value: "trade-off" }

  # SKILL.md orchestration discipline invariants
  # Prevent regression of 2026-05-12 root-cause patterns
  - id: skill-orchestration-discipline
    path: SKILL.md
    loaded_by: moderator-optional
    purpose: "SKILL.md itself — checked for forbidden orchestration patterns and required reconcile surface"
    invariants:
      - kind: forbidden
        value: "ScheduleWakeup("
        # debate orchestration must use foreground & wait for parallel sends.
        # ScheduleWakeup blind-waits cannot detect a hung wrapper.
        # Note: the word "ScheduleWakeup" may appear in §Red Flags as a warning;
        # only the invocation pattern ScheduleWakeup( is forbidden.
      - kind: forbidden
        value: "run_in_background`"
        # Bash run_in_background + internal & creates double-bg wrapper hang.
        # See §Red Flags #1.
        # Note: run_in_background may appear in §Red Flags as a warning label;
        # only the backtick-invocation form (as used in instructions) is forbidden.
      - kind: contains_all
        values:
          - "send fan-out 嵌套 Bash"
          - "ScheduleWakeup 等 debate"
          - "debate orchestration 本身放后台"
          - "wait` 拼接变量"
        # §Red Flags must enumerate the 4 forbidden patterns from 2026-05-12
        # debate runtime root-cause analysis.
      - kind: contains_all
        values:
          - "exit 3"
          - "session-not-found"
          - "--initial-round"
        # Reconcile section must reference the agent-session CLI surface area.

  # Inquiry preset modules
  - id: role-verifier
    path: references/roles/verifier.md
    loaded_by: role-session
    purpose: "Verifier role (Inquiry) — searches for supporting evidence for the hypothesis"
    invariants:
      - { kind: contains,  value: "supports" }
      - { kind: contains,  value: "inconclusive" }
      - { kind: contains,  value: "do not yourself produce `refutes`" }
      - { kind: forbidden, value: "## Your examination angle" }

  - id: role-falsifier
    path: references/roles/falsifier.md
    loaded_by: role-session
    purpose: "Falsifier role (Inquiry) — searches for counter-evidence and failure modes"
    invariants:
      - { kind: contains,  value: "refutes" }
      - { kind: contains,  value: "inconclusive" }
      # Positive assertion: the role file MUST instruct falsifier to not search for
      # supporting evidence (that is Verifier's job). Earlier this was phrased as a
      # `forbidden:` invariant which (a) had the wrong semantics — it told the test to
      # FAIL when the desired guard text was present — and (b) was case-sensitive against
      # `Do NOT` capitalization in the file, silently passing. C-fix flips it to contains.
      - { kind: contains,  value: "Do NOT search for supporting evidence" }
      # And explicitly forbid the inverse — falsifier MUST NOT produce `supports`
      - { kind: contains,  value: "do not produce `supports`" }

  - id: role-triangulator
    path: references/roles/triangulator.md
    loaded_by: role-session
    purpose: "Triangulator role (Inquiry) — surfaces orthogonal evidence"
    invariants:
      - { kind: contains,  value: "lateral" }
      - { kind: contains,  value: "orthogonal" }
      - { kind: contains,  value: "inconclusive" }

  - id: output-format-inquiry
    path: references/output-format-inquiry.md
    loaded_by: role-system-prompt
    purpose: "Inquiry preset output format spec — TL;DR with stance + source-kind tags + Argument"
    invariants:
      - { kind: contains_all, values: ["## TL;DR", "[stance:", "[source-kind:", "## Argument"] }
      - { kind: contains_all, values: ["supports", "refutes", "lateral", "inconclusive"] }
      - { kind: contains_all, values: ["empirical", "mechanism", "analogy", "theoretical", "counter-example"] }

  - id: stance-tags-inquiry
    path: references/stance-tags-inquiry.md
    loaded_by: role-system-prompt
    purpose: "Inquiry stance closed set with per-role mutex"
    invariants:
      - { kind: contains_all, values: ["supports", "refutes", "lateral", "inconclusive"] }
      - { kind: contains, value: "Per-role mutex" }

  - id: mode-inquiry
    path: references/modes/inquiry.md
    loaded_by: moderator-optional
    purpose: "Inquiry preset metadata — role-topology, stance-contract, checkpoint-policy"
    invariants:
      - { kind: contains_all, values: ["preset: inquiry", "role-topology:", "stance-contract:", "checkpoint-policy:", "output-format:", "source-kind-tag:"] }
      - { kind: contains, value: "per-role-mutex:" }

  # Discovery preset modules
  - id: role-explorer
    path: references/roles/explorer.md
    loaded_by: role-session
    purpose: "Explorer role (Discovery) — independent framing-axis proposer"
    invariants:
      - { kind: contains, value: "framing axis" }
      - { kind: contains, value: "stage=propose" }
      - { kind: contains, value: "Never `challenge` framing premises" }

  - id: role-compiler
    path: references/roles/compiler.md
    loaded_by: moderator-optional
    purpose: "Compiler role (Discovery) — checkpoint matrix synthesizer; explicitly no-recommendation"
    invariants:
      - { kind: contains_all, values: ["Framing Matrix", "Missing Axes", "Irreducible Divergences", "Open Questions"] }
      - { kind: contains, value: "## What you MUST NOT do" }
      - { kind: contains, value: "No Recommendation section" }
      - { kind: contains, value: "No Ranking section" }
      - { kind: contains, value: "No Stance / Stage tags" }

  - id: output-format-discovery
    path: references/output-format-discovery.md
    loaded_by: role-system-prompt
    purpose: "Discovery preset output format spec — TL;DR with stage + stance tags + Argument"
    invariants:
      - { kind: contains_all, values: ["## TL;DR", "[stage:", "[stance:", "## Argument"] }
      - { kind: contains_all, values: ["propose", "refine", "settle"] }
      - { kind: contains_all, values: ["expand", "challenge", "connect", "converge"] }

  - id: stage-tags-discovery
    path: references/stage-tags-discovery.md
    loaded_by: role-system-prompt
    purpose: "Discovery stage closed set with per-round mutex"
    invariants:
      - { kind: contains_all, values: ["propose", "refine", "settle"] }
      - { kind: contains, value: "Round mutex" }

  - id: stance-tags-discovery
    path: references/stance-tags-discovery.md
    loaded_by: role-system-prompt
    purpose: "Discovery stance closed set with per-role mutex"
    invariants:
      - { kind: contains_all, values: ["expand", "challenge", "connect", "converge"] }
      - { kind: contains, value: "Per-role mutex" }
      - { kind: contains, value: "Compiler does not emit" }
      # ↑ positive assertion: the file MUST phrase Compiler's exclusion as "does not emit"
      #   (forbidden: "Compiler emits" would self-defeat — the substring "Compiler ... emits"
      #   appears inside the moderator-reading table row about format violations)

  - id: mode-discovery
    path: references/modes/discovery.md
    loaded_by: moderator-optional
    purpose: "Discovery preset metadata — role-topology, two-tag-system, checkpoint-policy with forbidden-sections"
    invariants:
      - { kind: contains_all, values: ["preset: discovery", "role-topology:", "tag-system:", "checkpoint-policy:", "two-tag"] }
      - { kind: contains_all, values: ["forbidden-sections:", "recommendation", "best-option", "ranking"] }
